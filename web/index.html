  <script>
    // 1. القضاء على تحذيرات FedCM عبر تهيئة الهوية الجديدة
    window.onload = function () {
      google.accounts.id.initialize({
        client_id: "131777577750-dlj9t8sgpc09a6tnvoh119dt7lc0b4uh.apps.googleusercontent.com",

        auto_select: false,
        callback: (response) => {
          // التعامل مع الرد يتم داخلياً عبر Flutter Google Sign In
        }
      });
    };

    // 2. كود "إسكات" تحذيرات GSI_LOGGER المزعجة في الكونسول
    (function() {
      const originalWarn = console.warn;
      console.warn = function() {
        if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].includes('GSI_LOGGER')) {
          return; // تجاهل هذا التحذير تحديداً
        }
        originalWarn.apply(console, arguments);
      };
    })();
  </script>
