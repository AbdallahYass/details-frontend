name: Deployment
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. نزل الكود
      - uses: actions/checkout@v2

      # 2. نزل Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # 3. ابني الموقع
      - name: Build Flutter Web
        run: |
          flutter config --enable-web
          flutter build web --release

      # 4. الخطوة الحاسمة: ادخل المجلد وارفع يدوياً
      - name: Manual Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # نزل أداة Vercel الرسمية
          npm install -g vercel
          
          # ادخل على المجلد الجاهز (زي ما كنت تعمل بجهازك)
          cd build/web
          
          # صنع ملف صغير عشان ما يعطي 404 لما تعمل Refresh
          echo '{"rewrites": [{"source": "/(.*)", "destination": "/index.html"}]}' > vercel.json
          
          # أمر الرفع المباشر (بدون فلسفة)
          vercel deploy --prod --token $VERCEL_TOKEN --yes