name: Final Fix Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      # 1. تنزيل Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # 2. بناء الموقع
      - name: Build Web App
        run: |
          flutter config --enable-web
          flutter build web --release

      # 3. الحركة السحرية: نقل الملفات للواجهة + إنشاء ملف التوجيه
      - name: Move Files to Root
        run: |
          # انسخ ملفات الموقع من المجلد الداخلي للمجلد الرئيسي
          cp -r build/web/* .
          
          # احذف مجلد البناء القديم عشان ما يصير لخبطة
          rm -rf build
          
          # إنشاء ملف عشان تحديث الصفحة ما يعطي خطأ
          echo '{"rewrites": [{"source": "/(.*)", "destination": "/index.html"}]}' > vercel.json

      # 4. الرفع لـ Vercel (من المكان الحالي)
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./