name: Deploy Flutter Web
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. جلب الكود
      - uses: actions/checkout@v2

      # 2. تثبيت Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # 3. بناء الموقع
      - name: Build Web App
        run: |
          flutter config --enable-web
          flutter build web --release

      # 4. الرفع باستخدام Vercel CLI (نفس الطريقة اليدوية)
      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          # الأمر التالي يقول لـ Vercel: ارفع مجلد build/web فقط
          vercel deploy build/web --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}