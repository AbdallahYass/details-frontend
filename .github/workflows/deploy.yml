name: Deploy Flutter Web
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. جلب الكود
      - uses: actions/checkout@v2

      # 2. تثبيت Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # 3. بناء الموقع
      - name: Build Web App
        run: |
          flutter config --enable-web
          flutter build web --release

      # 4. التجهيز للنشر (الخطوة السحرية) ✨
      - name: Prepare Deployment Folder
        run: |
          # إنشاء مجلد نظيف للنشر
          mkdir deploy_folder
          
          # نسخ ملفات الموقع فقط إلى هذا المجلد
          cp -r build/web/* deploy_folder/
          
          # إنشاء ملف إعدادات عشان Vercel يفهم إنه تطبيق Flutter (يمنع مشاكل التحديث)
          echo '{"routes": [{"src": "/[^.]+", "dest": "/", "status": 200}]}' > deploy_folder/vercel.json

      # 5. الرفع لـ Vercel (من المجلد النظيف)
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: deploy_folder