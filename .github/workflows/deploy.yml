name: Force Deploy Flutter
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. جلب الكود
      - uses: actions/checkout@v2

      # 2. تثبيت Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      # 3. بناء الموقع
      - name: Build Web App
        run: |
          flutter config --enable-web
          flutter build web --release

      # 4. إصلاح مشكلة تحديث الصفحة (SPA Fix)
      # هذا السطر بيعمل ملف إعدادات صغير عشان الموقع ما يضرب لما تعمل Refresh
      - name: Create Vercel Config
        run: |
          echo '{"rewrites": [{"source": "/(.*)", "destination": "/"}]}' > build/web/vercel.json

      # 5. الرفع باستخدام الـ CLI الأصلي (بالقوة) 🔨
      - name: Force Deploy to Vercel
        run: |
          npm install -g vercel
          # الأمر التالي بيروح لداخل مجلد البناء وبيرفعه مباشرة
          vercel deploy build/web --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}