name: Production Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. بناء نسخة الويب (نفس اللي عملته بإيدك)
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: |
          flutter config --enable-web
          flutter build web --release
# 2. الرفع المباشر (نفس أوامرك اليدوية بالملي)
      - name: Deploy to Vercel
        run: |
          npm install -g vercel
          
          # تأكد إنك جوا المجلد
          cd build/web
          
          # نسخ ملف الإعدادات من المجلد الرئيسي لهون (مهم جداً للـ Routing)
          cp ../../vercel.json . || true
          
          # أمر الرفع اللي رح يطبع لنا الرابط اللي رفعه
          vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --yes > deploy_url.txt
          echo "الموقع اترفع هون:"
          cat deploy_url.txt
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}