name: Final Production Deploy
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Build Web
        run: |
          flutter config --enable-web
          flutter build web --release
          
      - name: Clean & Prepare Root
        run: |
          # حذف كل ملفات المشروع والاحتفاظ بملفات الويب فقط في المجلد الرئيسي
          mkdir temp_web
          cp -r build/web/* temp_web/
          rm -rf *
          cp -r temp_web/* .
          rm -rf temp_web
          # إنشاء ملف التوجيه لمنع الـ 404
          echo '{"rewrites": [{"source": "/(.*)", "destination": "/index.html"}]}' > vercel.json

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./