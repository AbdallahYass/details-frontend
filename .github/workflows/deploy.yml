name: Automated Production Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. بناء المشروع (زي ما عملت بإيدك)
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Build
        run: |
          flutter config --enable-web
          flutter build web --release

      # 2. الرفع باستخدام Vercel CLI (نفس أمر vercel --prod اللي زبط معك)
      - name: Deploy
        run: |
          npm install -g vercel
          # الدخول للمجلد والرفع المباشر
          cd build/web
          vercel deploy . --prod --token ${{ secrets.VERCEL_TOKEN }} --name details-frontend --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}